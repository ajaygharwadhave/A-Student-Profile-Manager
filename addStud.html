<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="main_sec">
        <form class="takingDetails">
            <section class="subTaking">
                <section>
                    <label class="heading">
                        FULL NAME:
                        <input type="text" placeholder="ENTER FULL NAME" class="name" id="uName"/>
                    </label>
                </section>


                <section>
                    <label class="heading">
                        Seat No:
                    </label>
                    <input type="tel" placeholder="ENTER VALID SEAT NUMBER" class="name" id="seatNo"/>
                </section>

                <section>
                    <label class="heading">
                        Enter Your Marks:
                    </label>
                    <br />
                    <label>
                        English
                        <input type="tel" class="name" id="Eng"/>
                    </label>
                    <br />
                    <label>
                        Maths
                        <input type="tel" class="name" id="Math"/>
                    </label>
                    <br />
                    <label>
                        Science
                        <input type="tel" class="name" id="Sci"/>
                    </label>
                </section>

            </section>
            <button href="#" class="submit_Btn" id="submit_bTn">SUBMIT</button>
        </form>
    </main>
    <script src="addStud.js"></script>
</body>

</html>
